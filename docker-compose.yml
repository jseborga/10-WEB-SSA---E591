version: "3.8"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: estudio-web
    ports:
      - "3000:3000"
    volumes:
      - estudio-data:/app/data
    environment:
      - DATABASE_URL=file:/app/data/custom.db
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  estudio-data:
    driver: local
